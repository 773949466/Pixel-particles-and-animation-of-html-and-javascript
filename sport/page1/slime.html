<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>跳动的方块</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #000;
    }

    .stage {
      position: relative;
      width: 96vw;
      height: min(94vh, 900px);
    }

    .traveler {
      position: absolute;
      left: 50%;
      bottom: 6%;
      /* 原尺寸为 22vmin / 230px，现在整体放大为 3 倍。 */
      width: min(clamp(420px, 66vmin, 690px), 80vw, 72vh);
      aspect-ratio: 1;
      translate: -50% 0;
      transform: translateX(0);
      will-change: transform;
    }

    .jumper {
      width: 100%;
      height: 100%;
      animation: jump 2.3s linear infinite;
      will-change: transform;
    }

    .block {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: rgba(150, 150, 150, .46);
      border: clamp(10px, 1.5vmin, 18px) solid rgba(230, 230, 230, .20);
      box-shadow:
        inset clamp(9px, 1.3vmin, 16px) clamp(9px, 1.3vmin, 16px) 0 rgba(255, 255, 255, .10),
        inset clamp(-16px, -1.3vmin, -9px) clamp(-16px, -1.3vmin, -9px) 0 rgba(0, 0, 0, .16);
      transform-origin: center bottom;
      animation: squash 2.3s linear infinite;
      will-change: transform;
    }

    /* 白色方块核心改为说明书中的方块粒子团。 */
    .particle-core {
      position: absolute;
      inset: 11%;
      width: 78%;
      height: 78%;
      display: block;
      image-rendering: pixelated;
    }

    /* 像素化高光让外壳看起来像一层方形史莱姆胶质。 */
    .block::after {
      content: "";
      position: absolute;
      inset: 3.5%;
      border-top: clamp(6px, 1vmin, 12px) solid rgba(255, 255, 255, .18);
      border-left: clamp(6px, 1vmin, 12px) solid rgba(255, 255, 255, .18);
      border-right: clamp(6px, 1vmin, 12px) solid rgba(20, 20, 20, .10);
      border-bottom: clamp(6px, 1vmin, 12px) solid rgba(20, 20, 20, .10);
      pointer-events: none;
    }

    /* 蓄力、腾空、下坠、落地回弹，模拟史莱姆的跳跃节奏。 */
    @keyframes jump {
      0%, 10%   { transform: translateY(0); }
      16%       { transform: translateY(0); }
      27%       { transform: translateY(-10%); }
      43%       { transform: translateY(-27%); }
      52%       { transform: translateY(-30%); }
      60%       { transform: translateY(-27%); }
      74%       { transform: translateY(-9%); }
      80%       { transform: translateY(0); }
      88%       { transform: translateY(-3%); }
      94%, 100% { transform: translateY(0); }
    }

    @keyframes squash {
      0%, 7%    { transform: scale(1); }
      12%       { transform: scaleX(1.10) scaleY(.70); }
      16%       { transform: scaleX(.86) scaleY(1.20); }
      29%       { transform: scaleX(.94) scaleY(1.08); }
      46%, 57%  { transform: scaleX(1.04) scaleY(.96); }
      70%       { transform: scaleX(.91) scaleY(1.11); }
      78%       { transform: scaleX(.86) scaleY(1.20); }
      82%       { transform: scaleX(1.10) scaleY(.62); }
      88%       { transform: scaleX(.94) scaleY(1.09); }
      94%       { transform: scaleX(1.04) scaleY(.96); }
      100%      { transform: scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .traveler,
      .jumper,
      .block {
        animation-play-state: paused;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="一个在黑色背景中跳动的白色方块">
    <div class="traveler" aria-hidden="true">
      <div class="jumper">
        <div class="block">
          <canvas class="particle-core" width="320" height="320"></canvas>
        </div>
      </div>
    </div>
  </main>

  <script>
    (() => {
      const canvas = document.querySelector('.particle-core');
      const ctx = canvas.getContext('2d', { alpha: true });
      const stage = document.querySelector('.stage');
      const traveler = document.querySelector('.traveler');
      const jumper = document.querySelector('.jumper');

      const jumpDuration = 2300;
      let jumpStartedAt = performance.now();
      let targetOffset = 0;
      let currentOffset = 0;
      let hopStartOffset = 0;
      let hopDestination = 0;
      let hopDirectionLocked = false;

      function horizontalLimit() {
        const expandedHalfWidth = traveler.offsetWidth * .55;
        return Math.max(0, stage.clientWidth / 2 - expandedHalfWidth - 4);
      }

      function clampOffset(value) {
        const limit = horizontalLimit();
        return Math.max(-limit, Math.min(limit, value));
      }

      function updateMouseTarget(clientX) {
        const stageBounds = stage.getBoundingClientRect();
        const stageCenter = stageBounds.left + stageBounds.width / 2;
        targetOffset = clampOffset(clientX - stageCenter);
      }

      window.addEventListener('pointermove', (event) => {
        updateMouseTarget(event.clientX);
      }, { passive: true });

      window.addEventListener('resize', () => {
        targetOffset = clampOffset(targetOffset);
        currentOffset = clampOffset(currentOffset);
      });

      jumper.addEventListener('animationstart', (event) => {
        if (event.animationName === 'jump') {
          jumpStartedAt = performance.now();
          hopDirectionLocked = false;
        }
      });

      jumper.addEventListener('animationiteration', (event) => {
        if (event.animationName === 'jump') {
          jumpStartedAt = performance.now();
          hopDirectionLocked = false;
        }
      });

      function lockHopDirection() {
        hopStartOffset = currentOffset;
        const distanceToMouse = targetOffset - currentOffset;
        const maximumHopDistance = traveler.offsetWidth * .70;
        const limitedHopDistance = Math.max(
          -maximumHopDistance,
          Math.min(maximumHopDistance, distanceToMouse)
        );
        hopDestination = clampOffset(
          hopStartOffset + limitedHopDistance
        );
        hopDirectionLocked = true;
      }

      function followMouse(timestamp) {
        const phase = ((timestamp - jumpStartedAt) % jumpDuration)
          / jumpDuration;

        /* 起跳瞬间锁定鼠标方向；本次跳跃中不再改变目标。 */
        if (phase >= .16 && !hopDirectionLocked) {
          lockHopDirection();
        }

        if (hopDirectionLocked && phase >= .16 && phase < .80) {
          const progress = (phase - .16) / (.80 - .16);
          const easedProgress = progress * progress * (3 - 2 * progress);
          currentOffset = hopStartOffset
            + (hopDestination - hopStartOffset) * easedProgress;
        } else if (hopDirectionLocked && phase >= .80) {
          currentOffset = hopDestination;
        }

        currentOffset = clampOffset(currentOffset);
        traveler.style.transform = `translateX(${currentOffset}px)`;
        requestAnimationFrame(followMouse);
      }

      /* squre_README.md 基准粒子流水线参数。 */
      const param = 10;
      const step = 2;
      /* 由 12×12 向右侧和下侧各增加一层，扩为 13×13。 */
      const gridWidth = 26;
      const gridHeight = 26;
      const framecount = 50;
      const particles = [];
      let offsets = [];
      let frame = 0;
      let doex = .45;
      const doey = .45;
      let driftDirection = 1;

      /* 仅保留说明书“一级 · 白色”，透明度仍持续产生明暗变化。 */
      const level = {
        color: '#ffffff',
        alpha: [0.88, 0.98],
        scale: 1.25,
        pulse: 0.04,
        refresh: framecount * 2
      };

      for (let gx = 0; gx < gridWidth; gx += step) {
        for (let gy = 0; gy < gridHeight; gy += step) {
          particles.push({
            gx,
            gy,
            alphaMix: Math.random(),
            phase: Math.random() * Math.PI * 2
          });
        }
      }

      function composeParticles() {
        offsets = [];
        for (let i = 0; i < particles.length; i += 1) {
          offsets.push([
            Math.floor(Math.random() * 2 * param),
            Math.floor(Math.random() * 2 * param)
          ]);
        }
      }

      function drawParticles() {
        frame += 1;
        doex += .006 * driftDirection;

        if (doex >= .9 || doex <= .35) {
          driftDirection *= -1;
        }

        if (frame % level.refresh === 1) {
          composeParticles();
        }

        /* 透明画布用等效透明衰减保留拖尾，不遮挡灰色外壳。 */
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0, 0, 0, .16)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'source-over';

        /* 每帧只生成一次全局尺寸，粒子团会作为整体同步呼吸。 */
        const globalSize = 2 * param
          + Math.floor(Math.random() * 2 * param);

        for (let i = 0; i < particles.length; i += 1) {
          const particle = particles[i];
          const [dx, dy] = offsets[i] || [0, 0];
          const breathing = 1
            + Math.sin(frame * .035 + particle.phase) * level.pulse;
          const brightness = .5
            + Math.sin(frame * .026 + particle.phase) * .5;
          const brightnessMix = particle.alphaMix * .3 + brightness * .7;
          const size = Math.max(
            step * param,
            globalSize * level.scale * breathing
          );
          const x = (particle.gx + doex) * param + dx;
          const y = (particle.gy + doey) * param + dy;

          ctx.globalAlpha = level.alpha[0]
            + brightnessMix * (level.alpha[1] - level.alpha[0]);
          ctx.fillStyle = level.color;
          ctx.fillRect(x, y, size, size);
        }

        ctx.globalAlpha = 1;
        requestAnimationFrame(drawParticles);
      }

      requestAnimationFrame(followMouse);
      composeParticles();
      drawParticles();
    })();
  </script>
</body>
</html>
