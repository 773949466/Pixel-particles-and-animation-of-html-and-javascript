<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Image Tile Particles</title>
    <style>
        * { box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<canvas id="c" aria-label="正菱形头像方块粒子动画"></canvas>

<script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const image = new Image();

    // 固定网格：动画期间始终保持 10 × 8 = 80 个方块。
    const COLS = 10;
    const ROWS = 8;
    const PARTICLE_COUNT = COLS * ROWS;
    const layoutCompactness = 0.84;

    const randomControl = {
        minDelay: 35,
        maxDelay: 150,
        jitter: 8,
        minScale: 0.96,
        maxScale: 1.34,
        minBrightness: 0.62,
        maxBrightness: 1
    };

    let viewportWidth = innerWidth;
    let viewportHeight = innerHeight;
    let dpr = 1;
    let cellSize = 42;
    let diamondRadius = 260;
    let particles = [];
    let animationStarted = false;

    function random(min, max) {
        return min + Math.random() * (max - min);
    }

    function nextDelay() {
        return Math.floor(random(randomControl.minDelay, randomControl.maxDelay));
    }

    // 图片只在加载完成后切分一次，之后不再增删粒子。
    function buildParticles() {
        const sourceWidth = image.naturalWidth / COLS;
        const sourceHeight = image.naturalHeight / ROWS;

        particles = [];
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                const scale = random(randomControl.minScale, randomControl.maxScale);
                const brightness = random(
                    randomControl.minBrightness,
                    randomControl.maxBrightness
                );

                particles.push({
                    col,
                    row,
                    sx: col * sourceWidth,
                    sy: row * sourceHeight,
                    sw: sourceWidth,
                    sh: sourceHeight,
                    baseX: 0,
                    baseY: 0,
                    offsetX: 0,
                    offsetY: 0,
                    targetOffsetX: random(-randomControl.jitter, randomControl.jitter),
                    targetOffsetY: random(-randomControl.jitter, randomControl.jitter),
                    scale,
                    targetScale: scale,
                    brightness,
                    targetBrightness: brightness,
                    timer: nextDelay()
                });
            }
        }

        updateLayout();
    }

    // 将固定的 10×8 方形坐标映射到正菱形，图片块的相对顺序保持不变。
    function updateLayout() {
        if (!particles.length) return;

        diamondRadius = Math.max(
            150,
            Math.min(Math.min(viewportWidth, viewportHeight) * 0.32, 294)
        );
        // 仍按原来的 12 列基准计算尺寸，减少数量但不放大方块。
        cellSize = Math.max(28, diamondRadius * 2 / 12);
        const centerX = viewportWidth / 2;
        const centerY = viewportHeight / 2;
        const layoutRadius = diamondRadius * layoutCompactness;

        for (const particle of particles) {
            const u = (particle.col + 0.5) / COLS * 2 - 1;
            const v = (particle.row + 0.5) / ROWS * 2 - 1;
            const maxAxis = Math.max(Math.abs(u), Math.abs(v));
            const axisSum = Math.abs(u) + Math.abs(v);
            const diamondScale = axisSum === 0 ? 0 : maxAxis / axisSum;

            particle.baseX = centerX + u * diamondScale * layoutRadius;
            particle.baseY = centerY + v * diamondScale * layoutRadius;
        }
    }

    function resize() {
        dpr = Math.min(devicePixelRatio || 1, 2);
        viewportWidth = innerWidth;
        viewportHeight = innerHeight;

        c.width = Math.round(viewportWidth * dpr);
        c.height = Math.round(viewportHeight * dpr);
        c.style.width = `${viewportWidth}px`;
        c.style.height = `${viewportHeight}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, viewportWidth, viewportHeight);

        updateLayout();
    }

    function chooseNextState(particle) {
        particle.targetOffsetX = random(-randomControl.jitter, randomControl.jitter);
        particle.targetOffsetY = random(-randomControl.jitter, randomControl.jitter);
        particle.targetScale = random(randomControl.minScale, randomControl.maxScale);
        particle.targetBrightness = random(
            randomControl.minBrightness,
            randomControl.maxBrightness
        );
        particle.timer = nextDelay();
    }

    function animate() {
        // 半透明黑色只衰减旧帧，让相邻帧继续叠加形成粒子拖尾。
        ctx.globalAlpha = 1;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.24)';
        ctx.fillRect(0, 0, viewportWidth, viewportHeight);

        for (const particle of particles) {
            // 每个粒子拥有独立计时器，但粒子本身不会生成或消失。
            if (--particle.timer <= 0) chooseNextState(particle);

            particle.offsetX += (particle.targetOffsetX - particle.offsetX) * 0.035;
            particle.offsetY += (particle.targetOffsetY - particle.offsetY) * 0.035;
            particle.scale += (particle.targetScale - particle.scale) * 0.035;
            particle.brightness +=
                (particle.targetBrightness - particle.brightness) * 0.025;

            const size = cellSize * particle.scale;
            const x = particle.baseX + particle.offsetX - size / 2;
            const y = particle.baseY + particle.offsetY - size / 2;

            ctx.globalAlpha = particle.brightness;
            ctx.drawImage(
                image,
                particle.sx,
                particle.sy,
                particle.sw,
                particle.sh,
                x,
                y,
                size,
                size
            );
        }

        ctx.globalAlpha = 1;
        requestAnimationFrame(animate);
    }

    image.addEventListener('load', () => {
        buildParticles();
        if (!animationStarted) {
            animationStarted = true;
            animate();
        }
    });

    image.addEventListener('error', () => {
        ctx.fillStyle = '#fff';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('image/头像2.png', viewportWidth / 2, viewportHeight / 2);
    });

    addEventListener('resize', resize);
    resize();
    image.src = '../image/头像2.png';
</script>
</body>
</html>
