<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页动画实验室</title>
    <style>
        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* ===== Canvas 画布 ===== */
        #canvas {
            display: block;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(255, 180, 30, 0.08);
        }

        /* ===== CSS 动画容器（备选） ===== */
        .scene {
            display: none;
            position: relative;
            width: 800px;
            height: 600px;
            border-radius: 12px;
            background: #000;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- === Canvas 主画布 === -->
    <canvas id="canvas" width="800" height="600"></canvas>

    <!-- === CSS 动画场景（备用） === -->
    <div class="scene" id="scene"></div>

    <script>
        // ============================================================
        //  纯白直线 · 亮段爬行  —  Pure White Line, Segment Lighting
        // ============================================================

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 600;
        const LINE_Y = H / 2;
        const LINE_W = 2.5;

        function resize() {
            const scale = Math.min(window.innerWidth / W, window.innerHeight / H, 1.2);
            canvas.style.width = (W * scale) + 'px';
            canvas.style.height = (H * scale) + 'px';
        }
        window.addEventListener('resize', resize);
        resize();

        // ============================================================
        //  光流 — 亮区中心沿直线移动
        // ============================================================
        const light = {
            x: -80,
            speed: 2.2,
            direction: 1,
            segmentLen: 140,     // 亮段长度 (px)

            update(dt) {
                this.x += this.speed * this.direction * dt * 0.12;
                if (this.x > W + this.segmentLen) this.direction = -1;
                if (this.x < -this.segmentLen)    this.direction = 1;
            }
        };

        // ============================================================
        //  绘制 — 暗基底 + 亮段渐变叠加
        // ============================================================
        function drawLine() {
            const half = light.segmentLen / 2;
            const x0 = light.x - half;
            const x1 = light.x + half;

            // 基底暗线（全段可见）
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.lineWidth = LINE_W;
            ctx.beginPath();
            ctx.moveTo(0, LINE_Y);
            ctx.lineTo(W, LINE_Y);
            ctx.stroke();
            ctx.restore();

            // 亮段叠加（渐变范围随光移动）
            const grad = ctx.createLinearGradient(x0, LINE_Y, x1, LINE_Y);
            grad.addColorStop(0.0,  'rgba(255, 255, 255, 0.12)');
            grad.addColorStop(0.15, 'rgba(255, 255, 255, 0.4)');
            grad.addColorStop(0.35, 'rgba(255, 255, 255, 0.85)');
            grad.addColorStop(0.5,  'rgba(255, 255, 255, 1.0)');
            grad.addColorStop(0.65, 'rgba(255, 255, 255, 0.85)');
            grad.addColorStop(0.85, 'rgba(255, 255, 255, 0.4)');
            grad.addColorStop(1.0,  'rgba(255, 255, 255, 0.12)');

            ctx.save();
            ctx.strokeStyle = grad;
            ctx.lineWidth = LINE_W;
            ctx.beginPath();
            ctx.moveTo(0, LINE_Y);
            ctx.lineTo(W, LINE_Y);
            ctx.stroke();
            ctx.restore();
        }

        // ============================================================
        //  循环
        // ============================================================
        let lastTime = 0;
        function loop(timestamp) {
            const dt = Math.min(timestamp - lastTime, 32);
            lastTime = timestamp;
            light.update(dt);
            ctx.clearRect(0, 0, W, H);
            drawLine();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>

</body>
</html>
